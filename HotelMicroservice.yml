server:
  port: 8081

spring:
  application:
    name: HotelMicroservice

  datasource:
    url: jdbc:mysql://localhost:3306/hotel_microdb
    username: root
    password: Deepali@1234

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka

      management:
  tracing:
    sampling:
      probability: 1.0

  zipkin:
    tracing:
      endpoint: http://localhost:9411/api/v2/spans

logging:
  pattern:
    level: "%5p [${spring.application.name:},%X{traceId:-},%X{spanId:-}]"
      
